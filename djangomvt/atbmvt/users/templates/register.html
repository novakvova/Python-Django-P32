{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">

        <div class="col-lg-8 col-xl-7">

            <div class="card shadow-lg p-4">
                <div class="card-header text-center bg-white border-0">
                    <h2 class="fw-bold">Реєстрація користувача</h2>
                </div>

                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label for="first_name" class="form-label">
                                    {{form.first_name.label}}
                                </label>
                                {{form.first_name}}
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Прізвище</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Введіть прізвище" required>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control form-control-lg" placeholder="example@gmail.com" required>
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control form-control-lg" placeholder="Введіть пароль" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Підтвердження пароля</label>
                                <input type="password" class="form-control form-control-lg" placeholder="Повторіть пароль" required>
                            </div>

                        </div>

                        <div class="mb-4">
                            <label class="form-label">Фото користувача</label>
                            <input type="file" class="form-control form-control-lg">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Зареєструватися
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

</div>
{% endblock %}
